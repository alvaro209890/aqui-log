name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web-and-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm --filter backend test

  flutter:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [company_app, courier_app]
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - working-directory: apps/${{ matrix.app }}
        run: flutter pub get
      - working-directory: apps/${{ matrix.app }}
        run: flutter analyze
      - working-directory: apps/${{ matrix.app }}
        run: flutter test
